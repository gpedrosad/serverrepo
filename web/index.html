<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="YurOTS — status, rankings, muertes y registro.">
  <title>YurOTS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; }
    .panel { display: none; }
    .panel.active { display: block; }
    .tbl th, .tbl td { padding: 0.4rem 0.6rem; }
    .tbl tr + tr { border-top: 1px solid rgba(255,255,255,.05); }
    .chip { font-size: 11px; padding: 0.2rem 0.55rem; border-radius: 999px; border: 1px solid rgba(255,255,255,.08); }
    .nav-btn.active { color: #fafafa; border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.06); }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body class="min-h-full text-zinc-300 antialiased text-xs pb-16">

<div class="mx-auto max-w-2xl px-3 pt-3 sm:px-4">

  <header class="mb-4 flex items-end justify-between gap-3 border-b border-white/[0.06] pb-3">
    <div>
      <h1 class="text-sm font-medium tracking-tight text-zinc-100">YurOTS</h1>
      <p id="meta-line" class="mt-0.5 text-[11px] text-zinc-500">—</p>
    </div>
    <div class="text-right">
      <p id="presence" class="text-[11px] tabular-nums text-zinc-400">—</p>
      <p id="server-dot" class="mt-0.5 inline-flex items-center gap-1.5 text-[11px] text-zinc-500">
        <span id="dot" class="h-1.5 w-1.5 rounded-full bg-zinc-600"></span>
        <span id="server-label">—</span>
      </p>
    </div>
  </header>

  <nav id="nav" class="mb-4 flex gap-1 overflow-x-auto pb-0.5"></nav>

  <!-- LIVE -->
  <section id="panel-live" class="panel active space-y-4">
    <div id="stats" class="grid grid-cols-4 gap-2"></div>
    <div id="snapshots" class="grid grid-cols-2 gap-2 sm:grid-cols-4"></div>
    <div>
      <p class="mb-2 text-[10px] uppercase tracking-widest text-zinc-600">Online</p>
      <div id="online-list" class="divide-y divide-white/[0.05] rounded-lg border border-white/[0.06] bg-white/[0.02]"></div>
    </div>
  </section>

  <!-- RANK -->
  <section id="panel-rank" class="panel space-y-3">
    <div class="flex flex-wrap gap-1" id="rank-tabs"></div>
    <div class="flex flex-wrap gap-1" id="voc-filters"></div>
    <div class="overflow-x-auto rounded-lg border border-white/[0.06]">
      <table class="tbl w-full min-w-[320px] text-left"><thead id="rank-head" class="text-[10px] uppercase tracking-wide text-zinc-600"></thead><tbody id="rank-body"></tbody></table>
    </div>
  </section>

  <!-- POWER -->
  <section id="panel-power" class="panel">
    <div class="overflow-x-auto rounded-lg border border-white/[0.06]">
      <table class="tbl w-full min-w-[280px] text-left">
        <thead class="text-[10px] uppercase tracking-wide text-zinc-600">
          <tr><th>#</th><th>Nombre</th><th>Exp hoy</th><th>Lvl</th><th class="hidden sm:table-cell">Voc</th></tr>
        </thead>
        <tbody id="power-body"></tbody>
      </table>
    </div>
  </section>

  <!-- FRAGS -->
  <section id="panel-frags" class="panel space-y-4">
    <div class="overflow-x-auto rounded-lg border border-white/[0.06]">
      <table class="tbl w-full min-w-[280px] text-left">
        <thead class="text-[10px] uppercase tracking-wide text-zinc-600">
          <tr><th>#</th><th>Nombre</th><th>Frags</th><th>Lvl</th><th class="hidden sm:table-cell">Voc</th></tr>
        </thead>
        <tbody id="frags-body"></tbody>
      </table>
    </div>
    <div id="frags-today-section" class="hidden">
      <p class="mb-2 text-[10px] uppercase tracking-widest text-zinc-600">Hoy</p>
      <div class="overflow-x-auto rounded-lg border border-white/[0.06]">
        <table class="tbl w-full min-w-[240px] text-left">
          <thead class="text-[10px] uppercase tracking-wide text-zinc-600">
            <tr><th>#</th><th>Nombre</th><th>Frags</th><th>Lvl</th></tr>
          </thead>
          <tbody id="frags-today-body"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- DEATHS -->
  <section id="panel-deaths" class="panel">
    <div class="overflow-x-auto rounded-lg border border-white/[0.06]">
      <table class="tbl w-full min-w-[320px] text-left">
        <thead class="text-[10px] uppercase tracking-wide text-zinc-600">
          <tr><th>#</th><th>Victima</th><th>Killer</th><th>Lvl</th><th>Cuando</th></tr>
        </thead>
        <tbody id="deaths-body"></tbody>
      </table>
    </div>
  </section>

  <!-- GUILDS -->
  <section id="panel-guilds" class="panel">
    <div id="guilds-list" class="space-y-2"></div>
  </section>

  <!-- ACCOUNT -->
  <section id="panel-account" class="panel">
    <form id="account-form" class="space-y-2.5 rounded-lg border border-white/[0.06] bg-white/[0.02] p-3">
      <p class="text-[10px] uppercase tracking-widest text-zinc-600">Registro · cliente 7171</p>
      <input type="text" name="company" tabindex="-1" autocomplete="off" class="hidden" aria-hidden="true">
      <input type="hidden" name="form_ts" id="form-ts">
      <input type="hidden" name="challenge_id" id="challenge-id">
      <input type="number" name="account" required min="100000" max="999999" inputmode="numeric" placeholder="Cuenta (6 dígitos)"
        class="w-full rounded-md border border-white/[0.08] bg-black/40 px-2.5 py-2 text-xs text-zinc-100 outline-none focus:border-white/20">
      <div class="grid grid-cols-2 gap-2">
        <input type="password" name="password" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9]{3,20}" autocomplete="new-password" placeholder="Password"
          class="rounded-md border border-white/[0.08] bg-black/40 px-2.5 py-2 text-xs text-zinc-100 outline-none focus:border-white/20">
        <input type="password" name="password2" required minlength="3" maxlength="20" autocomplete="new-password" placeholder="Repetir"
          class="rounded-md border border-white/[0.08] bg-black/40 px-2.5 py-2 text-xs text-zinc-100 outline-none focus:border-white/20">
      </div>
      <input type="text" name="name" required minlength="3" maxlength="20" pattern="[a-zA-Z ]{3,20}" autocomplete="username" placeholder="Nombre del personaje"
        class="w-full rounded-md border border-white/[0.08] bg-black/40 px-2.5 py-2 text-xs text-zinc-100 outline-none focus:border-white/20">
      <div class="grid grid-cols-2 gap-2">
        <select name="sex" class="rounded-md border border-white/[0.08] bg-black/40 px-2.5 py-2 text-xs text-zinc-100 outline-none focus:border-white/20">
          <option value="1">M</option><option value="0">F</option>
        </select>
        <select name="voc" class="rounded-md border border-white/[0.08] bg-black/40 px-2.5 py-2 text-xs text-zinc-100 outline-none focus:border-white/20">
          <option value="1">Sorcerer</option><option value="2">Druid</option><option value="3">Paladin</option><option value="4">Knight</option>
        </select>
      </div>
      <label class="block">
        <span class="mb-1 block text-[10px] text-zinc-600">Verificación: <span id="captcha-q">…</span></span>
        <input type="number" name="captcha" required inputmode="numeric" placeholder="Resultado"
          class="w-full rounded-md border border-white/[0.08] bg-black/40 px-2.5 py-2 text-xs text-zinc-100 outline-none focus:border-white/20">
      </label>
      <button type="submit" id="account-submit" class="w-full rounded-md border border-white/10 py-2 text-xs text-zinc-200 hover:bg-white/[0.04] disabled:opacity-40">Crear cuenta</button>
    </form>
    <p id="account-result" class="mt-2 hidden rounded-md px-2.5 py-2 text-xs"></p>
  </section>

  <!-- INFO -->
  <section id="panel-info" class="panel">
    <div id="info-list" class="space-y-2"></div>
  </section>
</div>

<script>
const state = { panel: 'live', rank: 'level', voc: 'all', data: null };
const NAV = [
  ['live', 'Live'], ['rank', 'Top'], ['power', 'Power'], ['frags', 'Frags'],
  ['deaths', 'Muertes'], ['guilds', 'Guilds'], ['account', 'Cuenta'], ['info', 'Info'],
];
const RANK_META = {
  level: { label: 'Lvl', cols: ['level','exp_fmt','maglevel','guild','lastlogin_rel'] },
  ml: { label: 'ML', cols: ['maglevel','level','vocation_short','lastlogin_rel'] },
  sword: { label: 'Swd', cols: ['sword','level','vocation_short','lastlogin_rel'] },
  distance: { label: 'Dist', cols: ['distance','level','vocation_short','lastlogin_rel'] },
  frags: { label: 'Frg', cols: ['frags','level','vocation_short','lastlogin_rel'] },
};
const COL_LABEL = { level:'Lvl', exp_fmt:'Exp', maglevel:'ML', guild:'Guild', lastlogin_rel:'Login', vocation_short:'Voc', sword:'Swd', distance:'Dist', frags:'Frg' };

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
function chip(active) { return `chip cursor-pointer transition-colors ${active ? 'nav-btn active text-zinc-100' : 'text-zinc-500 hover:text-zinc-300'}`; }
function empty(msg) { return `<p class="px-3 py-6 text-center text-zinc-600">${msg}</p>`; }

function renderNav() {
  document.getElementById('nav').innerHTML = NAV.map(([k, l]) =>
    `<button type="button" data-panel="${k}" class="${chip(state.panel === k)}">${l}</button>`
  ).join('');
}

function showPanel(name) {
  state.panel = name;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  renderNav();
  if (name === 'account') loadRegisterChallenge();
}

async function loadRegisterChallenge() {
  const form = document.getElementById('account-form');
  document.getElementById('form-ts').value = String(Date.now() / 1000);
  try {
    const r = await fetch('/api/register-challenge', { cache: 'no-store' });
    const d = await r.json();
    document.getElementById('challenge-id').value = d.id || '';
    document.getElementById('captcha-q').textContent = d.question || '—';
    form.captcha.value = '';
  } catch {
    document.getElementById('captcha-q').textContent = 'recargá la página';
  }
}

function renderStats(srv) {
  const occ = srv.players_max ? Math.round((srv.players_online / srv.players_max) * 100) : 0;
  document.getElementById('stats').innerHTML = [
    { k: 'Online', v: `${srv.players_online}/${srv.players_max}` },
    { k: 'Peak', v: srv.players_peak },
    { k: 'Uptime', v: srv.uptime_fmt || '—' },
    { k: 'Load', v: `${occ}%` },
  ].map(c => `<div class="rounded-md border border-white/[0.06] bg-white/[0.02] px-2 py-1.5">
    <p class="text-[10px] text-zinc-600">${c.k}</p>
    <p class="mt-0.5 tabular-nums text-zinc-200">${esc(String(c.v))}</p>
  </div>`).join('');
}

function renderSnapshots(data) {
  const top = data.rankings.level[0];
  const ml = data.rankings.ml[0];
  const death = data.deaths[0];
  const guild = data.guilds[0];
  const items = [
    { k: 'Top lvl', v: top ? top.name : '—', s: top ? `L${top.level}` : '' },
    { k: 'Top ML', v: ml ? ml.name : '—', s: ml ? `ML ${ml.maglevel}` : '' },
    { k: 'Muerte', v: death ? death.victim : '—', s: death ? death.killer : '' },
    { k: 'Guild', v: guild ? guild.name : '—', s: guild ? `${guild.count} m.` : '' },
  ];
  document.getElementById('snapshots').innerHTML = items.map(i =>
    `<div class="rounded-md border border-white/[0.06] px-2 py-1.5 min-w-0">
      <p class="text-[10px] text-zinc-600">${i.k}</p>
      <p class="mt-0.5 truncate text-zinc-200">${esc(i.v)}</p>
      ${i.s ? `<p class="truncate text-[10px] text-zinc-600">${esc(i.s)}</p>` : ''}
    </div>`
  ).join('');
}

function renderOnline(list) {
  const el = document.getElementById('online-list');
  if (!list.length) { el.innerHTML = empty('Nadie online'); return; }
  el.innerHTML = list.map(p =>
    `<div class="flex items-center justify-between gap-2 px-3 py-2">
      <div class="min-w-0 flex items-center gap-2">
        <span class="h-1.5 w-1.5 shrink-0 rounded-full bg-emerald-500/80"></span>
        <span class="truncate text-zinc-200">${esc(p.name)}</span>
        <span class="text-[10px] text-zinc-600">${esc(p.vocation_short || p.vocation)}</span>
      </div>
      <span class="tabular-nums text-zinc-400">${p.level}</span>
    </div>`
  ).join('');
}

function row(cells, hlIdx) {
  return cells.map((c, i) => `<td class="${i === hlIdx ? 'text-amber-200/90 tabular-nums' : 'text-zinc-400'}">${c}</td>`).join('');
}

function renderPower(list) {
  const b = document.getElementById('power-body');
  if (!list.length) { b.innerHTML = `<tr><td colspan="5">${empty('Sin exp hoy')}</td></tr>`; return; }
  b.innerHTML = list.map((p, i) =>
    `<tr><td class="text-zinc-600">${i+1}</td><td class="text-zinc-200">${esc(p.name)}</td>${row([esc(p.gain_fmt), p.level, `<span class="hidden sm:inline">${esc(p.vocation_short)}</span>`], 0)}</tr>`
  ).join('');
}

function renderFrags(all, today) {
  const b = document.getElementById('frags-body');
  if (!all.length) b.innerHTML = `<tr><td colspan="5">${empty('—')}</td></tr>`;
  else b.innerHTML = all.map((p, i) =>
    `<tr><td class="text-zinc-600">${i+1}</td><td class="text-zinc-200">${esc(p.name)}</td>${row([p.frags, p.level, `<span class="hidden sm:inline">${esc(p.vocation_short)}</span>`], 0)}</tr>`
  ).join('');
  const sec = document.getElementById('frags-today-section');
  if (!today.length) { sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  document.getElementById('frags-today-body').innerHTML = today.map((p, i) =>
    `<tr><td class="text-zinc-600">${i+1}</td><td class="text-zinc-200">${esc(p.name)}</td>${row([p.frags, p.level], 0)}</tr>`
  ).join('');
}

function renderRankTabs() {
  document.getElementById('rank-tabs').innerHTML = Object.entries(RANK_META).map(([k, v]) =>
    `<button type="button" data-rank="${k}" class="${chip(state.rank === k)}">${v.label}</button>`
  ).join('');
}

function renderVocFilters(vocs) {
  let h = `<button type="button" data-voc="all" class="${chip(state.voc === 'all')}">All</button>`;
  vocs.forEach(v => { h += `<button type="button" data-voc="${esc(v)}" class="${chip(state.voc === v)}">${esc(v.slice(0, 4))}</button>`; });
  document.getElementById('voc-filters').innerHTML = h;
}

function filtered(list) { return state.voc === 'all' ? list : list.filter(p => p.vocation === state.voc); }

function renderRankings() {
  if (!state.data) return;
  const meta = RANK_META[state.rank];
  const list = filtered(state.data.rankings[state.rank] || []);
  const cols = ['#', 'Nombre', ...meta.cols.map(c => COL_LABEL[c] || c)];
  document.getElementById('rank-head').innerHTML = '<tr>' + cols.map((c, i) => {
    const hide = (c === 'Guild' || c === 'Login') ? ' hidden sm:table-cell' : '';
    return `<th class="${hide}${i === 0 ? ' w-6' : ''}">${c}</th>`;
  }).join('') + '</tr>';
  const body = document.getElementById('rank-body');
  if (!list.length) { body.innerHTML = `<tr><td colspan="99">${empty('—')}</td></tr>`; return; }
  const hl = meta.cols[0];
  body.innerHTML = list.map((p, i) => {
    const cells = meta.cols.map(c => {
      const hide = (c === 'guild' || c === 'lastlogin_rel') ? ' hidden sm:table-cell' : '';
      const cls = c === hl ? 'text-amber-200/90 tabular-nums' : 'text-zinc-400';
      return `<td class="${cls}${hide}">${esc(String(p[c] ?? '—'))}</td>`;
    }).join('');
    return `<tr><td class="text-zinc-600">${i+1}</td><td class="text-zinc-200">${esc(p.name)}</td>${cells}</tr>`;
  }).join('');
}

function renderDeaths(deaths) {
  const b = document.getElementById('deaths-body');
  if (!deaths.length) { b.innerHTML = `<tr><td colspan="5">${empty('—')}</td></tr>`; return; }
  b.innerHTML = deaths.map(d =>
    `<tr><td class="text-zinc-600">${d.rank}</td><td class="text-zinc-200">${esc(d.victim)}</td><td class="text-rose-300/80">${esc(d.killer)}</td><td class="text-zinc-400">${d.level}</td><td class="text-zinc-600">${esc(d.time_rel)}</td></tr>`
  ).join('');
}

function renderGuilds(guilds) {
  const el = document.getElementById('guilds-list');
  if (!guilds.length) { el.innerHTML = empty('Sin guilds'); return; }
  el.innerHTML = guilds.map(g =>
    `<div class="rounded-md border border-white/[0.06] px-3 py-2">
      <div class="flex items-center justify-between gap-2">
        <span class="text-zinc-200">${esc(g.name)}</span>
        <span class="text-[10px] tabular-nums text-zinc-600">${g.count}</span>
      </div>
      ${g.members.length ? `<p class="mt-1 text-[10px] leading-relaxed text-zinc-600">${esc(g.members.slice(0, 10).join(', '))}${g.members.length > 10 ? '…' : ''}</p>` : ''}
    </div>`
  ).join('');
}

function renderInfo(sections) {
  const el = document.getElementById('info-list');
  if (!sections.length) { el.innerHTML = empty('—'); return; }
  el.innerHTML = sections.map(s =>
    `<div class="rounded-md border border-white/[0.06] px-3 py-2">
      <p class="text-[10px] uppercase tracking-widest text-zinc-600">${esc(s.title)}</p>
      <ul class="mt-1.5 space-y-0.5 text-[11px] leading-relaxed text-zinc-500">${s.lines.map(l => `<li>${esc(l)}</li>`).join('')}</ul>
    </div>`
  ).join('');
}

function renderAll() {
  if (!state.data) return;
  const srv = state.data.server;
  document.getElementById('meta-line').textContent = `7.6 · ${state.data.updated} · refresh 60s`;
  document.getElementById('presence').textContent = `${srv.players_online}/${srv.players_max} online`;
  document.getElementById('server-label').textContent = srv.online ? 'online' : 'offline';
  document.getElementById('dot').className = `h-1.5 w-1.5 rounded-full ${srv.online ? 'bg-emerald-500' : 'bg-red-500/80'}`;
  renderStats(srv);
  renderSnapshots(state.data);
  renderOnline(state.data.online || []);
  renderPower(state.data.powergamers || []);
  renderFrags(state.data.top_fraggers || [], state.data.frags_today || []);
  renderRankTabs();
  renderVocFilters(state.data.vocations || []);
  renderRankings();
  renderDeaths(state.data.deaths || []);
  renderGuilds(state.data.guilds || []);
  renderInfo(state.data.otinfo || []);
}

async function refresh() {
  try {
    const r = await fetch('/api/data', { cache: 'no-store' });
    if (!r.ok) throw new Error('bad');
    state.data = await r.json();
    renderAll();
  } catch {
    document.getElementById('meta-line').textContent = 'sin conexión';
    document.getElementById('presence').textContent = '—';
  }
}

document.getElementById('nav').addEventListener('click', e => {
  const b = e.target.closest('[data-panel]');
  if (b) showPanel(b.dataset.panel);
});

document.getElementById('panel-rank').addEventListener('click', e => {
  const r = e.target.closest('[data-rank]');
  if (r) { state.rank = r.dataset.rank; renderRankTabs(); renderRankings(); return; }
  const v = e.target.closest('[data-voc]');
  if (v) { state.voc = v.dataset.voc; renderVocFilters(state.data?.vocations || []); renderRankings(); }
});

document.getElementById('account-form').addEventListener('submit', async e => {
  e.preventDefault();
  const f = e.target, btn = document.getElementById('account-submit'), res = document.getElementById('account-result');
  res.classList.add('hidden');
  if (f.password.value !== f.password2.value) {
    res.textContent = 'Los passwords no coinciden';
    res.className = 'mt-2 rounded-md px-2.5 py-2 text-xs bg-red-500/10 text-red-300/90';
    res.classList.remove('hidden');
    return;
  }
  btn.disabled = true;
  try {
    const r = await fetch('/api/create-account', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        account: parseInt(f.account.value, 10),
        name: f.name.value.trim(),
        password: f.password.value,
        sex: parseInt(f.sex.value, 10),
        voc: parseInt(f.voc.value, 10),
        captcha: f.captcha.value,
        challenge_id: f.challenge_id.value,
        company: f.company.value,
        form_ts: parseFloat(f.form_ts.value),
      }),
    });
    const d = await r.json();
    res.textContent = d.message || 'Error';
    res.className = 'mt-2 rounded-md px-2.5 py-2 text-xs ' + (d.ok ? 'bg-emerald-500/10 text-emerald-300/90' : 'bg-red-500/10 text-red-300/90');
    res.classList.remove('hidden');
    if (d.ok) {
      f.reset();
      loadRegisterChallenge();
    } else {
      loadRegisterChallenge();
    }
  } catch {
    res.textContent = 'Error de conexión';
    res.className = 'mt-2 rounded-md px-2.5 py-2 text-xs bg-red-500/10 text-red-300/90';
    res.classList.remove('hidden');
  } finally {
    btn.disabled = false;
  }
});

renderNav();
refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
