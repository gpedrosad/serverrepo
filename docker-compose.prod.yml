services:
  yurots:
    build: .
    container_name: yurots
    working_dir: /app/YurOTS/ots
    volumes:
      - ./server/YurOTS:/app/YurOTS
    ports:
      - "7171:7171"
      - "7172:7172"
    restart: unless-stopped
    command: ["./source/yurots"]

  web:
    image: python:3.12-slim
    container_name: yurots-web
    working_dir: /app
    volumes:
      - .:/app:ro
      - ./web/state:/app/web/state
      - ./server/YurOTS/ots/data/players:/app/server/YurOTS/ots/data/players
    ports:
      - "8080:8080"
    environment:
      PLAYERS_DIR: /app/server/YurOTS/ots/data/players
      GUILDS_FILE: /app/server/YurOTS/ots/data/guilds.xml
      OTINFO_FILE: /app/OTINFO
      ONLINE_FILE: /app/server/YurOTS/ots/data/online.xml
      STATE_FILE: /app/web/state/daily.json
      OT_HOST: yurots
      OT_PORT: "7171"
      SERVER_IP: "159.223.110.159"
    command: ["python3", "web/server.py"]
    depends_on:
      - yurots
    restart: unless-stopped
